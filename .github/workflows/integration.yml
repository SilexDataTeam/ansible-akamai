---
name: Integration

# Service-independent tests (argument validation, check-mode) always run; live,
# service-dependent tests are skipped when the Akamai service is unavailable
# (a warning annotation is raised). Set setup_akamai_require_service=true via
# integration_config.yml to fail instead of skipping.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: ansible-core ${{ matrix.ansible }} (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ansible: "2.14"
            python: "3.11"
          - ansible: "2.15"
            python: "3.11"
          - ansible: "2.16"
            python: "3.11"
          - ansible: "2.17"
            python: "3.11"
          - ansible: "2.18"
            python: "3.11"
          - ansible: "2.19"
            python: "3.11"
          - ansible: "2.20"
            python: "3.12"
          - ansible: "2.21"
            python: "3.12"
    steps:
      - name: Check out collection
        uses: actions/checkout@v7
        with:
          path: ansible_collections/silexdata/akamai

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }}
        run: python -m pip install "ansible-core~=${{ matrix.ansible }}.0"

      # Run without --color so the teed log greps cleanly, and pipe through tee
      # so a later step can detect the service-unavailable marker.
      - name: Run integration tests
        working-directory: ansible_collections/silexdata/akamai
        run: |
          set -o pipefail
          ansible-test integration manage_akamai --docker -v --requirements \
            2>&1 | tee "${RUNNER_TEMP}/integration.log"

      - name: Surface service-availability warning
        if: always()
        run: |
          log="${RUNNER_TEMP}/integration.log"
          if [ -f "$log" ] && grep -aq 'SETUP_SERVICE_UNAVAILABLE' "$log"; then
            echo "::warning title=Akamai service unavailable::Live tests skipped (service unreachable, ansible-core ${{ matrix.ansible }})."
          fi
