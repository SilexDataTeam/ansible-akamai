---
release_summary: |
  This release adds a test and CI pipeline for the collection and hardens the
  ``manage_akamai`` module: check mode support, graceful handling of missing
  Python dependencies, stricter input validation, and documentation and
  packaging-standards fixes.
minor_changes:
  - manage_akamai - add check mode support; no API calls are made in check mode and a change is predicted only for write methods (PATCH, POST, PUT).
  - manage_akamai - validate the ``method`` parameter against its supported choices (GET, PATCH, POST, PUT).
  - manage_akamai - document the ``edge_auth`` suboptions and correct the documented ``edge_config`` type to ``path``.
bugfixes:
  - >-
    manage_akamai - fail with a clear ``missing required library`` message when
    ``requests`` or ``edgegrid-python`` is not installed, instead of raising an
    import error or printing to stdout.
  - >-
    manage_akamai - guard the optional third-party imports so the module can be
    imported (and its documentation collected) without ``requests`` or
    ``edgegrid-python`` present.
deprecated_features:
  - >-
    manage_akamai - the old module name ``silexdata.akamai.akamai`` is
    deprecated in favor of ``silexdata.akamai.manage_akamai`` and will be
    removed in 2.0.0; a redirect keeps it working with a deprecation warning.
trivial:
  - Set the serialization profile in the unit test helper for ansible-core 2.19+ compatibility.
  - Use a reserved ``.invalid`` host for the integration dry-run so the availability probe reliably reports the service as down.
  - Ignore the ``validate-modules`` GPLv3 license check, as the collection is licensed under Apache-2.0.
