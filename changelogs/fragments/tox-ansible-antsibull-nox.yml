---
trivial:
  - Add ``noxfile.py`` and ``antsibull-nox.toml`` to enable antsibull-nox as
    the primary local and CI test runner. Default sessions cover ruff linting,
    yamllint, ansible-lint, docs check (antsibull-docs), collection build and
    Galaxy importer validation, trailing-whitespace checks, and ansible-test
    sanity and unit matrices across all supported ansible-core versions.
  - Add ``[tool.tox-ansible]`` configuration to ``pyproject.toml`` for running
    sanity, unit, and integration tests via tox-ansible (``tox --ansible``).
  - Add a ``nox.yml`` GitHub Actions workflow using the
    ``ansible-community/antsibull-nox`` reusable matrix to run all default
    sessions on push and pull request, generating per-ansible-core × Python
    jobs for sanity and units alongside single-job sessions for lint,
    docs check, ansible-lint, build validation, and extra checks.
