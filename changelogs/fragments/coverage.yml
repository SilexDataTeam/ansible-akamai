---
trivial:
  - Add a Coverage GitHub Actions workflow that runs ansible-test with the
    ``--coverage`` flag for both unit and integration tests, generates a
    text report and an XML artifact, and surfaces a warning annotation when
    the Akamai service is unavailable during integration tests.
  - Expand unit tests to cover the ``edge_config`` authentication path,
    the ``body`` parameter, missing-library failure paths in ``main()``,
    and the full success/error flow through ``main()``; raises
    ``manage_akamai.py`` line coverage from 74% to 93%.
