---
trivial:
  - >-
    Add a Changelog workflow that requires every pull request into main to add a
    changelog fragment.
  - >-
    Add a Release workflow that, on merge to main, derives the next semantic
    version from the pending changelog fragments, runs antsibull-changelog,
    bumps galaxy.yml, pushes the release commit and tag to main, and publishes
    the collection to Ansible Galaxy.
  - >-
    Add antsibull-changelog pre-commit hooks to lint changelog fragments and
    changelog.yaml.
