---
# Pre-commit hooks for the silexdata.akamai collection.
#
# Setup (one time, per clone):
#   pip install pre-commit
#   pre-commit install
#
# Run against everything on demand:
#   pre-commit run --all-files
#
# Refresh hook versions:
#   pre-commit autoupdate
#
# These hooks cover lint/format/hygiene only. The heavier ansible-test suites
# (sanity / units / integration) run in GitHub Actions, not as pre-commit hooks.

minimum_pre_commit_version: "3.0.0"

repos:
  # General file hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
      - id: check-yaml
        # Allow custom tags occasionally used in Ansible/Galaxy YAML.
        args: ["--allow-multiple-documents"]
        exclude: ^changelogs/changelog\.yaml$

  # Python lint + format + import sorting (replaces flake8/black/isort).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  # YAML linting.
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["--strict"]

  # Markdown linting (pure-Python, no Node dependency).
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.38
    hooks:
      - id: pymarkdown
        args: ["--config", ".pymarkdown.json", "scan"]
        # CHANGELOG.md is generated by antsibull-changelog from changelog.yaml.
        exclude: ^CHANGELOG\.md$

  # Ansible content linting.
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint

  # Changelog fragment + changelog.yaml linting.
  - repo: https://github.com/ansible-community/antsibull-changelog
    rev: 0.35.1
    hooks:
      - id: antsibull-changelog-lint
      - id: antsibull-changelog-lint-changelog-yaml
