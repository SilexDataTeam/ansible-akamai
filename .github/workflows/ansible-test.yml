---
# Reusable workflow that runs an ansible-test suite across the supported
# ansible-core matrix. Called by sanity.yml, units.yml, and integration.yml so
# the matrix and setup steps live in exactly one place.
name: ansible-test

on:
  workflow_call:
    inputs:
      test-type:
        description: "ansible-test subcommand to run: sanity, units, or integration."
        required: true
        type: string

permissions:
  contents: read

jobs:
  ansible-test:
    name: ansible-core ${{ matrix.ansible }} (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ansible: "2.14"
            python: "3.11"
          - ansible: "2.15"
            python: "3.11"
          - ansible: "2.16"
            python: "3.11"
          - ansible: "2.17"
            python: "3.11"
          - ansible: "2.18"
            python: "3.11"
          - ansible: "2.19"
            python: "3.11"
          - ansible: "2.20"
            python: "3.12"
          - ansible: "2.21"
            python: "3.12"
    steps:
      - name: Check out collection
        uses: actions/checkout@v4
        with:
          path: ansible_collections/silexdata/akamai

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }}
        run: python -m pip install "ansible-core~=${{ matrix.ansible }}.0"

      - name: Run ${{ inputs.test-type }} tests
        if: inputs.test-type != 'integration'
        working-directory: ansible_collections/silexdata/akamai
        run: ansible-test ${{ inputs.test-type }} --docker -v --color --requirements

      # Integration runs without --color so the teed log greps cleanly, and pipes
      # through tee so a later step can detect the service-unavailable marker.
      - name: Run integration tests
        if: inputs.test-type == 'integration'
        working-directory: ansible_collections/silexdata/akamai
        run: |
          set -o pipefail
          ansible-test integration manage_akamai --docker -v --requirements \
            2>&1 | tee "${RUNNER_TEMP}/integration.log"

      - name: Surface service-availability warning
        if: always() && inputs.test-type == 'integration'
        run: |
          log="${RUNNER_TEMP}/integration.log"
          if [ -f "$log" ] && grep -aq 'SETUP_SERVICE_UNAVAILABLE' "$log"; then
            echo "::warning title=Akamai service unavailable::Live tests skipped (service unreachable, ansible-core ${{ matrix.ansible }})."
          fi
