---
# Setup role for the silexdata.akamai integration tests.
#
# Responsibilities:
#   1. Initialize the shared setup_akamai_* variables.
#   2. Probe the Akamai API for availability and record
#      setup_akamai_service_available so service-dependent ("live") tests can be
#      skipped when the service is down.
#
# When the service is unreachable the default behavior is to warn and let live
# tests skip. Set setup_akamai_require_service=true to fail the run instead.

- name: Initialize the shared EdgeGrid auth variable
  ansible.builtin.set_fact:
    setup_akamai_edge_auth:
      host: "{{ setup_akamai_api_host }}"
      client_token: "{{ setup_akamai_client_token }}"
      client_secret: "{{ setup_akamai_client_secret }}"
      access_token: "{{ setup_akamai_access_token }}"

- name: Probe the Akamai API endpoint for availability
  ansible.builtin.wait_for:
    host: "{{ setup_akamai_api_host }}"
    port: 443
    timeout: "{{ setup_akamai_service_probe_timeout }}"
    state: started
  register: setup_akamai_probe
  ignore_errors: true

- name: Record whether the Akamai service is available
  ansible.builtin.set_fact:
    setup_akamai_service_available: "{{ setup_akamai_probe is succeeded }}"

- name: Fail because the Akamai service is unavailable and is required
  ansible.builtin.fail:
    msg: >-
      Akamai service {{ setup_akamai_api_host }}:443 is not reachable and
      setup_akamai_require_service is enabled.
  when:
    - not (setup_akamai_service_available | bool)
    - setup_akamai_require_service | bool

- name: Warn that live tests will be skipped because the service is unavailable
  ansible.builtin.debug:
    # Prints a stable marker token (SETUP_SERVICE_UNAVAILABLE) so CI can detect
    # this condition in the run output and raise a native warning annotation.
    # Locally this just surfaces as a readable warning message.
    msg: >-
      SETUP_SERVICE_UNAVAILABLE: Akamai service
      {{ setup_akamai_api_host }}:443 is not reachable; skipping live
      integration tests. Set setup_akamai_require_service=true to fail instead.
  when:
    - not (setup_akamai_service_available | bool)
    - not (setup_akamai_require_service | bool)
