---
name: Coverage

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage ${{ matrix.ansible }} (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ansible: "2.14"
            python: "3.11"
          - ansible: "2.15"
            python: "3.11"
          - ansible: "2.16"
            python: "3.11"
          - ansible: "2.17"
            python: "3.11"
          - ansible: "2.18"
            python: "3.11"
          - ansible: "2.19"
            python: "3.11"
          - ansible: "2.20"
            python: "3.12"
          - ansible: "2.21"
            python: "3.12"
    steps:
      - name: Check out collection
        uses: actions/checkout@v7
        with:
          path: ansible_collections/silexdata/akamai

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }}
        run: python -m pip install "ansible-core~=${{ matrix.ansible }}.0"

      - name: Display Ansible Test Version
        working-directory: ansible_collections/silexdata/akamai
        run: ansible-test --version

      - name: Run unit tests with coverage
        working-directory: ansible_collections/silexdata/akamai
        run: ansible-test units --coverage --docker -v --requirements

      # Run without --color so the teed log greps cleanly.
      - name: Run integration tests with coverage
        working-directory: ansible_collections/silexdata/akamai
        run: |
          set -o pipefail
          ansible-test integration manage_akamai --coverage --docker -v --requirements \
            2>&1 | tee "${RUNNER_TEMP}/integration.log"

      - name: Surface service-availability warning
        if: always()
        run: |
          log="${RUNNER_TEMP}/integration.log"
          if [ -f "$log" ] && grep -aq 'SETUP_SERVICE_UNAVAILABLE' "$log"; then
            echo "::warning title=Akamai service unavailable::Live integration tests skipped (service unreachable)."
          fi

      - name: Generate coverage report
        working-directory: ansible_collections/silexdata/akamai
        run: |
          ansible-test coverage report --requirements
          ansible-test coverage xml --requirements
          ansible-test coverage html --requirements

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ansible_collections/silexdata/akamai/tests/output/reports/
          if-no-files-found: warn
