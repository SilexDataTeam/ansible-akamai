# Project tooling configuration for the silexdata.akamai collection.
# This file configures developer tooling only; it is not part of the published
# collection artifact (see build_ignore in galaxy.yml).

[tool.ruff]
line-length = 160
target-version = "py39"
extend-exclude = [
    "changelogs",
    "tests/output",
]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: flake8-bugbear
select = ["E", "W", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Ansible modules must declare DOCUMENTATION/EXAMPLES/RETURN before their
# imports, which conflicts with E402 (module-level import not at top of file).
"plugins/modules/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "preserve"
