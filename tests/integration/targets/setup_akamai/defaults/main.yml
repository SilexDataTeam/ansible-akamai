---
# Variables owned by the setup_akamai role (role-name prefixed).
setup_akamai_test_endpoint: "/siteshield/v1/maps"

# Placeholder EdgeGrid credentials. Override these in
# tests/integration/integration_config.yml to run the live (service-dependent)
# tests against a real Akamai tenant. The default host uses the reserved
# .invalid TLD (RFC 6761) so the availability probe reliably reports the
# service as down during a dry-run (Akamai's wildcard DNS would otherwise make
# a bogus *.akamaiapis.net host look reachable).
setup_akamai_api_host: "dry-run.akamai.invalid"
setup_akamai_client_token: "akab-dry-run-client-token"
setup_akamai_client_secret: "dry-run-client-secret"
setup_akamai_access_token: "akab-dry-run-access-token"

# Service-availability handling. By default an unreachable service produces a
# warning and the live tests are skipped. Set this to true (e.g. from the
# pipeline) to fail the run instead when the service is down.
setup_akamai_require_service: false

# Seconds to wait when probing the API endpoint for availability.
setup_akamai_service_probe_timeout: 5
